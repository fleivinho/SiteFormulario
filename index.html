<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <style>
    body {
      background-color: rgb(236, 236, 236);
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
    }

    h1 {
      text-align: center;
    }

    #formulario {
      width: 900px;
      margin: 0 auto;
    }

    form {
      padding-right: 150px;
    }

    label {
      text-align: right;
      padding-right: 15px;
      display: inline-block;
      width: 150px;
    }

    input {
      width: 400px;
      height: 25px;
    }

    select {
      font-size: 16px;
    }

    .interesses {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-left: 165px;
    }

    .interesses label {
      width: auto;
      padding-right: 0;
      text-align: left;
    }

    .interesses input {
      width: auto;
      height: auto;
    }

    #idade {
      width: 70px;
      height: 28px;
    }

    #data,
    #hora,
    #data-hora {
      width: 190px;
    }

    input[type="color"] {
      width: 40px;
      height: 30px;
      padding: 0;
      vertical-align: middle;
    }

    input[type="range"] {
      width: 270px;
      vertical-align: middle;
    }

    textarea {
      width: 450px;
      height: 120px;
      resize: none;
      vertical-align: top;
    }

    input[type="file"] {
      width: auto;
      height: auto;
    }

    .botoes {
      margin-top: 20px;
      padding-left: 150px;
      text-align: center;
    }

    .botoes input {
      width: 110px;
      height: 35px;
      margin: 0 8px;
      cursor: pointer;
      border: 1px solid #999;
      border-radius: 3px;
    }

    .botoes input[type="submit"] {
      background-color: #0d6efd;
      color: white;
      border: 1px solid #0a58ca;
    }

    .botoes input[type="reset"] {
      background-color: #f2f2f2;
      color: black;
    }
  </style>
</head>

<body>
  <h1>Formulário de Cadastro</h1>
  <hr>
  <div id="formulario">
    <form>
      <label for="nome">Nome:</label>
      <input type='text' id="nome" />
      <hr>

      <label for="email">Email:</label>
      <input type='email' id="email" />

      <hr>

      <label for="senha">Senha:</label>
      <input type="password" id="senha" />

      <hr>

      <div id="idadeformato">
        <label for="idade">Idade:</label>
        <select id="idade" name="idade">
          <option>0</option>
          <option>11</option>
          <option>12</option>
          <option>13</option>
          <option>14</option>
          <option>15</option>
          <option>16</option>
          <option>17</option>
          <option>18</option>
          <option>19</option>
          <option>20</option>
        </select>
      </div>

      <hr>
      <label for="telefone">Telefone:</label>
      <input type="tel" id="telefone">

      <hr>
      <label for="site">Site:</label>
      <input type="url" id="site">

      <hr>

      <label for="data">Data de Nascimento:</label>
      <input type="date" id="data" />
      <hr>

      <label for="hora">Hora preferida:</label>
      <input type="time" id="hora" />

      <hr>
      <label for="datahora">Data e hora:</label>
      <input type="datetime-local" id="data-hora" name="data-hora">
      <hr>

      <label for="cor">Cor preferida:</label>
      <input type="color" name="cor" id="cor">
      <hr>

      <label for="satisfa">Nível de satisfação:</label>
      <input type="range" name="satisfa" id="satisfa">
      <hr>

      <div>
        <label>Interesses:</label>
        <div class="interesses">
          <label><input type="checkbox"> Futebol</label>
          <label><input type="checkbox"> Programação</label>
          <label><input type="checkbox"> Games</label>
        </div>
      </div>

      <hr>

      <label for="sexo">Sexo:</label>
      <select id="sexo" name="sexo">
        <option>Masculino</option>
        <option>Feminino</option>
        <option>Outro</option>
      </select>

      <hr>

      <label for="observacoes">Observações:</label>
      <textarea id="observacoes" name="observacoes"></textarea>

      <hr>

      <label for="foto">Foto de perfil:</label>
      <input type="file" id="foto" name="foto">

      <hr>

      <div class="botoes">
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
      </div>
    </form>
  </div>
</body>

</html>
